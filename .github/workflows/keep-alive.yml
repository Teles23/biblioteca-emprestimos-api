name: Keep Alive

on:
  schedule:
    # Roda a cada 14 minutos para evitar que o Render durma (dorme após 15 min de inatividade)
    # e para manter o Supabase ativo (pausa após 7 dias de inatividade no plano free)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Permite rodar manualmente também

jobs:
  ping:
    name: Ping Backend & Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Ping Backend (Render)
        run: |
          echo "Pingando backend no Render..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_BACKEND_URL }}/health")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Aviso: backend retornou status $STATUS"
          fi

      - name: Ping Supabase (evitar pause)
        run: |
          echo "Pingando Supabase..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Aviso: Supabase retornou status $STATUS"
          fi
